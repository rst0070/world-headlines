apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}-backend
  labels:
    app: {{ .Values.name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Values.name }}-backend
    spec:
      containers:
        - name: {{ .Values.name }}-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: INFISICAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.infisical.secretName | default (printf "%s-infisical" .Values.name) }}
                  key: INFISICAL_TOKEN
            - name: INFISICAL_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.infisical.secretName | default (printf "%s-infisical" .Values.name) }}
                  key: INFISICAL_PROJECT_ID
            - name: INFISICAL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.infisical.secretName | default (printf "%s-infisical" .Values.name) }}
                  key: INFISICAL_HOST
            - name: INFISICAL_ENVIRONMENT
              value: {{ .Values.backend.infisical.environment | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-backend
  labels:
    app: {{ .Values.name }}-backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
  selector:
    app: {{ .Values.name }}-backend
